                    </p>
                    <div className="flex items-center justify-end gap-1 mt-1">
                      ${tx.status === 'pending' ? html`
                        <span className="text-[10px] text-orange-500 font-black uppercase flex items-center gap-1"><${Timer} size=${10}/> Pending</span>
                      ` : html`
                        <span className="text-[10px] text-gray-600 font-bold uppercase">Completed</span>
                      `}
                    </div>
                 </div>
              </div>
            `)}
          </div>
        `)}
      </div>
    `;

    // --- MAIN APP ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('home');
      const [showBalance, setShowBalance] = useState(false);
      const [showWithdrawFlow, setShowWithdrawFlow] = useState(false);
      const [showSeeMore, setShowSeeMore] = useState(false);
      const [withdrawAmount, setWithdrawAmount] = useState('');
      const [isWithdrawing, setIsWithdrawing] = useState(false);
      const [withdrawError, setWithdrawError] = useState(false);
      const balanceValue = "354,450.00";

      const handleWithdraw = () => {
        if (!withdrawAmount) return;
        setIsWithdrawing(true);
        setTimeout(() => {
          setIsWithdrawing(false);
          setWithdrawError(true);
        }, 2000);
      };

      return html`
        <div className="bg-[#050505] min-h-screen text-white font-sans overflow-hidden">
          {/* HEADER */}
          <div className="fixed top-0 w-full max-w-md mx-auto left-0 right-0 z-[60] bg-[#050505] px-5 py-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-[#1c1c1e] flex items-center justify-center relative">
                <${Menu} size=${20} className="text-gray-300" />
                <div className="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full border border-[#050505]"></div>
              </div>
              <div className="bg-[#1c1c1e] px-4 py-2 rounded-full flex items-center gap-2 border border-white/[0.05]">
                <span className="text-sm font-medium">Crypto</span>
                <${ChevronDown} size=${14} className="text-gray-500" />
              </div>
            </div>
            <div className="flex items-center gap-5">
              <${Search} size=${22} className="text-gray-300" />
              <${Headphones} size=${22} className="text-gray-300" />
            </div>
          </div>

          {/* CONTENT SCROLL AREA */}
          <main className="max-w-md mx-auto pt-20 pb-28 h-screen overflow-y-auto hide-scrollbar">
            ${activeTab === 'home' && html`<${HomeView} balanceValue=${balanceValue} showBalance=${showBalance} setShowBalance=${setShowBalance} onWithdraw=${() => setShowWithdrawFlow(true)} onSeeMore=${() => setShowSeeMore(true)} />`}
            ${activeTab === 'wallet' && html`<${WalletView} />`}
            ${activeTab === 'market' && html`<${MarketView} />`}
            ${activeTab === 'card' && html`<${CardView} />`}
            ${activeTab === 'history' && html`<${HistoryView} />`}
          </main>

          {/* NAVIGATION */}
          <nav className="fixed bottom-0 w-full max-w-md mx-auto left-0 right-0 bg-[#0a0a0c] border-t border-white/[0.05] z-[70] rounded-t-[2.5rem]">
            <div className="flex justify-around items-center py-4 px-2">
              <${NavItem} icon=${html`<${Home} size=${24} />`} label="Home" active=${activeTab === 'home'} onClick=${() => setActiveTab('home')} dot />
              <${NavItem} icon=${html`<${Wallet} size=${24} />`} label="Wallet" active=${activeTab === 'wallet'} onClick=${() => setActiveTab('wallet')} />
              <${NavItem} icon=${html`<${LayoutGrid} size=${24} />`} label="Markets" active=${activeTab === 'market'} onClick=${() => setActiveTab('market')} />
              <${NavItem} icon=${html`<${CreditCard} size=${24} />`} label="Cards" active=${activeTab === 'card'} onClick=${() => setActiveTab('card')} />
              <${NavItem} icon=${html`<${Clock} size=${24} />`} label="History" active=${activeTab === 'history'} onClick=${() => setActiveTab('history')} />
            </div>
          </nav>

          {/* WITHDRAW FLOW */}
          ${showWithdrawFlow && html`
            <div className="fixed inset-0 z-[100] bg-[#050505] flex flex-col max-w-md mx-auto animate-in slide-in-from-right duration-300">
              <div className="p-6 flex items-center justify-between">
                <button onClick=${() => setShowWithdrawFlow(false)} className="bg-[#1c1c1e] p-2 rounded-full"><${X} size=${20}/></button>
                <h2 className="font-bold text-lg">Withdraw NGN</h2>
                <div className="w-10"></div>
              </div>
              <div className="p-6 flex-1 flex flex-col">
                <div className="space-y-4">
                  <label className="text-gray-500 text-xs font-bold uppercase tracking-widest">Amount to Withdraw</label>
                  <div className="flex items-end gap-2 border-b border-white/10 pb-4">
                    <input
                      type="number"
                      autoFocus
                      value=${withdrawAmount}
                      onChange=${(e) => setWithdrawAmount(e.target.value)}
                      placeholder="0.00"
                      className="bg-transparent text-5xl font-bold w-full outline-none"
                    />
                    <span className="text-2xl font-bold text-gray-500 mb-1">NGN</span>
                  </div>
                  <p className="text-gray-500 text-xs font-bold">Balance: ₦${balanceValue}</p>
                </div>

                <div className="mt-10 space-y-4">
                   <label className="text-gray-500 text-xs font-bold uppercase tracking-widest">Select Destination</label>
                   <div className="bg-[#121214] p-5 rounded-3xl border border-white/5 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className="w-12 h-12 rounded-2xl bg-emerald-600/10 flex items-center justify-center text-emerald-500"><${Banknote} /></div>
                        <div><p className="font-bold">Opay Service</p><p className="text-xs text-gray-500">8104219585</p></div>
                      </div>
                      <${ChevronRight} size=${20} className="text-gray-600" />
                   </div>
                </div>

                <button
                  onClick=${handleWithdraw}
                  disabled=${!withdrawAmount || isWithdrawing}
                  className="mt-auto w-full bg-[#268aff] h-16 rounded-3xl font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform"
                >
                  ${isWithdrawing ? html`<${Loader2} className="animate-spin" />` : "Proceed Withdrawal"}
                </button>
              </div>

              ${withdrawError && html`
                <div className="absolute inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-8 z-[110]">
                  <div className="bg-[#121214] p-8 rounded-[2.5rem] w-full text-center space-y-6 border border-rose-500/20">
                    <div className="w-20 h-20 bg-rose-500/20 rounded-full flex items-center justify-center mx-auto text-rose-500"><${AlertCircle} size=${40}/></div>
                    <h3 className="text-xl font-bold">Maintenance Notice</h3>
                    <p className="text-gray-400 text-sm leading-relaxed">Withdrawal is currently unavailable due to maintenance, kindly contact support or try again later.</p>
                    <button onClick=${() => {setWithdrawError(false); setShowWithdrawFlow(false)}} className="w-full bg-[#1c1c1e] py-4 rounded-2xl font-bold border border-white/10">Try Again Later</button>
                  </div>
                </div>
              `}
            </div>
          `}

          {/* SEE MORE OVERLAY */}
          ${showSeeMore && html`
            <div className="fixed inset-0 z-[90] bg-black/95 flex flex-col max-w-md mx-auto animate-in slide-in-from-bottom duration-300">
               <div className="p-8 flex justify-between items-center">
                 <h2 className="text-2xl font-bold">Services</h2>
                 <button onClick=${() => setShowSeeMore(false)}><${X}/></button>
               </div>
               <div className="grid grid-cols-3 gap-6 p-8">
                  ${[ {i: html`<${ArrowUpRight}/>`, l: 'Send'}, {i: html`<${ArrowDownLeft}/>`, l: 'Receive'}, {i: html`<${Plus}/>`, l: 'Fiat'}, {i: html`<${RefreshCw}/>`, l: 'Swap'}, {i: html`<${ShieldCheck}/>`, l: 'Vault'}, {i: html`<${Info}/>`, l: 'Support'} ].map((item, idx) => html`
                    <div key=${idx} className="flex flex-col items-center gap-3">
                      <div className="w-16 h-16 bg-[#1c1c1e] rounded-full flex items-center justify-center text-[#268aff]">${item.i}</div>
                      <span className="text-xs font-bold text-gray-400">${item.l}</span>
                    </div>
                  `)}
               </div>
            </div>
          `}
        </div>
      `;
    };

    // --- RENDER ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(html`<${App} />`);
  </script>
</body>
</html>
